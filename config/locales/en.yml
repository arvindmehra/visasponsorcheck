# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  # Structured copy used by SponsorsHelper#company_expanded_profile_paragraphs
  # to build extra, genuinely-informative paragraphs on each company's sponsor
  # profile page (app/views/companies/show.html.erb). Company pages otherwise
  # rely on a single short licence-summary sentence, which reads as thin,
  # template-identical content across ~126,000 near-duplicate pages. Each
  # array is rotated deterministically by company.id (see the helper) so a
  # given company always sees the same copy, while different companies get a
  # varied mix — the same anti-duplicate-content technique already used by
  # SponsorsHelper#company_licence_summary_paragraph.
  #
  # Placeholders use Ruby's String#% "%{name}" interpolation (not I18n's own
  # interpolation, which doesn't recurse into translated arrays) — see the
  # helper for how these get filled in with real company/licence data.
  company_profile:
    regional_context:
      - "Companies based in %{city} make up part of the UK's regional visa sponsorship landscape, and %{company_name} is one of the employers registered there with UKVI. Job seekers researching visa sponsorship opportunities in %{city} can use directories like this one to confirm which local employers are genuinely licensed before applying, rather than relying on a job advert's claim alone. Regional sponsor numbers fluctuate over time as licences are granted, suspended, or revoked, so a location's sponsor population today may look noticeably different from a year ago."
      - "%{city} is home to a range of UK visa sponsors spanning different industries, and %{company_name} appears in that local register. Understanding which companies in %{city} hold an active sponsor licence can help candidates prioritise applications toward employers who are actually able to support a visa application, and avoid wasting time on ones that aren't currently licensed at all. Larger cities and regional hubs tend to have deeper, more varied pools of sponsors than smaller towns, which is worth factoring into any job search strategy centred on visa sponsorship."
      - "As one of the sponsor licence holders registered in %{city}, %{company_name} sits within a wider regional pool of UK employers approved to hire overseas workers. Anyone exploring visa sponsorship options in and around %{city} can cross-check this page against the official GOV.UK register for the latest status, since local sponsor populations can shift as licences are granted, suspended, or revoked. Comparing several nearby sponsors rather than fixating on just one tends to give a more realistic picture of the local sponsorship landscape."
      - "Within the UK's regional sponsorship landscape, %{company_name} is registered under a %{city}-based address. Local labour markets like %{city}'s often have a mix of sponsors across sectors and company sizes, so it's worth comparing %{company_name} against other licensed employers nearby before relying on any single company as your only route to UK visa sponsorship. Regional economic conditions and sector concentration both influence how many active sponsors a given area ends up with at any point in time."
    industry_context:
      - "On the %{route} route specifically, sponsor licences like the one held by %{company_name} allow the company to issue a Certificate of Sponsorship to eligible overseas workers, subject to meeting that route's salary and skill thresholds. Not every vacancy at a sponsoring company comes with visa sponsorship attached, so it's always worth confirming directly with the employer before assuming a specific role is sponsored. Sponsors are also expected to advertise roles fairly and pay at or above the going rate for the occupation before offering sponsorship."
      - "The %{route} route is one of several visa categories UKVI sponsors can be licensed for, and %{company_name}'s current licence covers this specific route. Employers must continue to meet ongoing compliance duties — accurate HR record-keeping, reporting changes in a sponsored worker's circumstances, and more — in order to keep a %{route} licence in good standing rather than risk suspension. UKVI carries out periodic compliance checks, and a poor track record can result in a downgraded rating or, in serious cases, licence revocation."
      - "Holding a licence on the %{route} route means %{company_name} has been vetted by UKVI specifically to sponsor workers under that category's rules. Requirements vary by route, so a company licensed for %{route} is not automatically approved to sponsor workers on other routes without applying for and being granted a separate licence covering that route. Each route also carries its own eligibility criteria for the sponsored worker, covering salary, skill level, and sometimes English language requirements."
      - "%{company_name}'s sponsor licence covers the %{route} visa route, one of several routes UKVI oversees as part of the UK's points-based immigration system. Sponsors are expected to maintain accurate records and comply with reporting duties for as long as they hold an active licence on this route, and can lose it if those duties aren't met. The specific route a company is licensed for also determines which visa category any worker it sponsors will actually be issued."
    verification_note:
      - "%{status_clause} Always cross-check a company's live status against the official GOV.UK Register of Licensed Sponsors before making a decision based on it, since individual licences can be granted, suspended, or revoked at any point between one register update and the next. Treating any third-party directory, including this one, as a starting point rather than a final answer is generally the safest approach."
      - "%{status_clause} For anything time-sensitive — weighing up a job offer, preparing a visa application, or running a compliance check — treat this page as a helpful starting point and confirm current status on GOV.UK's own published register directly, which remains the single authoritative source. Sponsor status can change between one daily sync and the next, so recency matters more than usual here."
      - "%{status_clause} This page reflects the most recently completed sync of the GOV.UK register rather than a real-time feed, so for the single most up-to-date status on any given day, GOV.UK's own register is still the definitive reference to check against. Where a decision genuinely depends on current licence status, that extra step of double-checking directly is worth the couple of minutes it takes."
