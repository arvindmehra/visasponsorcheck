# PostgreSQL via Postgres.app
# https://postgresapp.com
#
# Ensure the pg gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5432
  username: <%= ENV.fetch("DATABASE_USERNAME") { ENV["USER"] } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "" } %>

development:
  <<: *default
  database: visasponsorcheck_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: visasponsorcheck_test

production:
  primary:
    <<: *default
    database: visasponsorcheck_production
    username: <%= ENV.fetch("DATABASE_USERNAME") { "visasponsorcheck" } %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    database: visasponsorcheck_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: visasponsorcheck_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: visasponsorcheck_production_cable
    migrations_paths: db/cable_migrate
