# Kamal 2 deployment configuration for DigitalOcean
# Docs: https://kamal-deploy.org
#
# Deploy with: kamal deploy
# First deploy: kamal setup

# ── Application ────────────────────────────────────────────
service: visasponsoruk

# Docker image name. Replace with your Docker Hub username.
image: arvind490/visasponsoruk

# ── Builder ────────────────────────────────────────────────
builder:
  arch: amd64

servers:
  web:
    hosts:
      - 167.99.201.191   # ← Replace with your Droplet IP



# ── SSH ────────────────────────────────────────────────────
ssh:
  user: root

# ── Docker Registry ────────────────────────────────────────
registry:
  username: arvind490
  password:
    - KAMAL_REGISTRY_PASSWORD   # Set in .kamal/secrets

# ── Proxy (Thruster → Traefik) ─────────────────────────────
proxy:
  ssl: true
  # Both the apex and www domains must be listed here so kamal-proxy (a)
  # accepts requests for either Host header instead of refusing/timing out
  # on www, and (b) requests a Let's Encrypt cert covering both. The actual
  # www → apex 301 redirect is handled at the Rails routing layer (see the
  # `constraints(host: ...)` block at the top of config/routes.rb) — kamal-proxy
  # itself has no generic redirect-rule feature. This only works once DNS has
  # an A/CNAME record for www.visasponsoruk.com pointing at the same server;
  # that DNS change has to be made with your registrar/DNS provider, not here.
  hosts:
    - visasponsoruk.com          # ← Replace with your domain
    - www.visasponsoruk.com
  healthcheck:
    path: /up
    interval: 5
    timeout: 10

# ── Environment Variables ──────────────────────────────────
env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: false   # Thruster serves static files
    WEB_CONCURRENCY: "0"              # Single-process Puma (saves RAM)
    MALLOC_ARENA_MAX: "2"             # Reduces memory fragmentation
    RAILS_MAX_THREADS: "3"
  secret:
    - RAILS_MASTER_KEY      # Decrypts config/credentials.yml.enc
    - DATABASE_URL          # Constructed securely in .kamal/secrets
    - HTTP_USERNAME         # HTTP Basic Auth for /pghero
    - HTTP_PASSWORD

# ── Accessories ────────────────────────────────────────────
# Accessories are Docker containers Kamal manages alongside
# the app on the same Droplet. PostgreSQL runs here.
accessories:
  postgres:
    image: postgres:16
    host: 167.99.201.191   # ← Same Droplet IP as above
    port: "127.0.0.1:5432:5432"   # Only accessible locally (not exposed to internet)
    cmd: postgres -c shared_preload_libraries=pg_stat_statements
    env:
      clear:
        POSTGRES_DB: visasponsoruk_production
        POSTGRES_USER: visasponsoruk
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - /var/lib/postgresql/data:/var/lib/postgresql/data   # Persistent data on Droplet disk

# ── Volumes ────────────────────────────────────────────────
# Persistent data paths shared between container recreations
volumes:
  - "/var/www/visasponsoruk/sitemaps:/rails/public/sitemaps"

# ── Aliases ────────────────────────────────────────────────
aliases:
  console: app exec --interactive --reuse 'bin/rails console'
  shell:   app exec --interactive --reuse 'bash'
  logs:    app logs -f
  dbc:     app exec --interactive --reuse 'bin/rails dbconsole'

